name: SDD Gate Approval

on:
  workflow_dispatch:
    inputs:
      change:
        description: Change ID
        required: true
      gate:
        description: Gate ID, for example G3_DESIGN
        required: true
      evidence_ids:
        description: Space-separated Evidence IDs
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  create-approval:
    runs-on: ubuntu-latest
    environment: sdd-approval
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-governance.txt
      - run: python -m pip install -r requirements-governance.txt
      - name: Prepare protected Gate identity
        id: identity
        env:
          SDD_GITHUB_ROLE_MAP_JSON: ${{ secrets.SDD_GITHUB_ROLE_MAP_JSON }}
          SDD_IDENTITY_PEPPER_B64: ${{ secrets.SDD_IDENTITY_PEPPER_B64 }}
          SDD_GATE_INPUT: ${{ inputs.gate }}
        run: |
          set -euo pipefail
          umask 077
          oidc_file="$RUNNER_TEMP/sdd-oidc-$GITHUB_RUN_ID.json"
          trap 'rm -f "$oidc_file"' EXIT HUP INT TERM
          curl --fail --silent --show-error --max-filesize 65536 \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sdd-approval" \
            -o "$oidc_file"
          python scripts/prepare_gate_identity.py \
            --oidc-response "$oidc_file" \
            --gate "$SDD_GATE_INPUT"
      - name: Create approval from trusted workflow context
        id: approval
        env:
          SDD_CHANGE_INPUT: ${{ inputs.change }}
          SDD_GATE_INPUT: ${{ inputs.gate }}
          SDD_EVIDENCE_IDS_INPUT: ${{ inputs.evidence_ids }}
          SDD_ACTOR_ID: ${{ steps.identity.outputs.actor_id }}
          SDD_ACTOR_ROLE: ${{ steps.identity.outputs.actor_role }}
          SDD_IDENTITY_PROVIDER: github-oidc
          SDD_IDENTITY_CLAIM: ${{ steps.identity.outputs.identity_claim }}
          SDD_COMMIT_SHA: ${{ steps.identity.outputs.commit_sha }}
        run: |
          set -euo pipefail
          approval_path="$(python scripts/create_approval.py --from-env)"
          printf 'path=%s\n' "$approval_path" >> "$GITHUB_OUTPUT"
      - name: Validate generated approval
        run: python scripts/validate_enterprise.py
      - name: Cleanup OIDC temporary file
        if: always()
        run: rm -f "$RUNNER_TEMP/sdd-oidc-$GITHUB_RUN_ID.json"
      - uses: actions/upload-artifact@v4
        with:
          name: sdd-approval-${{ github.run_id }}
          path: ${{ steps.approval.outputs.path }}
          if-no-files-found: error
          retention-days: 90
